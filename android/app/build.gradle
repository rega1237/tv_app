plugins {
   id "com.android.application"
   id "kotlin-android"
   id "dev.flutter.flutter-gradle-plugin"
   id "com.google.gms.google-services"  // Google Services plugin

}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}


android {
    namespace "com.xprodigital.app"
    compileSdkVersion 35
    

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    lintOptions {
        disable 'InvalidPackage'
        checkReleaseBuilds false
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "com.xprodigital.app"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

   signingConfigs {
       release {
           keyAlias keystoreProperties['keyAlias']
           keyPassword keystoreProperties['keyPassword']
           storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
           storePassword keystoreProperties['storePassword']
       }
   }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}



dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:2.1.0"
}

gradle.projectsEvaluated {
    tasks.withType(JavaCompile) {
        doFirst {
            System.err.println "HOOK: Checking/Patching GeneratedPluginRegistrant.java..."
            def file = project.file("src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java")
            if (file.exists()) {
                def content = file.text
                def needsPatch = false
                if (!content.contains("import androidx.annotation.NonNull;")) {
                    content = content.replace("package io.flutter.plugins;", "package io.flutter.plugins;\nimport androidx.annotation.Keep;\nimport androidx.annotation.NonNull;\nimport io.flutter.Log;")
                    needsPatch = true
                }
                if (content.contains("Log.e(") && !content.contains("android.util.Log.e(")) {
                    content = content.replace("Log.e(", "android.util.Log.e(")
                    needsPatch = true
                }
                if (needsPatch) {
                    file.write(content)
                    System.err.println "HOOK: Patched GeneratedPluginRegistrant.java with imports and Log fixes."
                } else {
                    System.err.println "HOOK: No patching needed for GeneratedPluginRegistrant.java."
                }
            } else {
                System.err.println "HOOK: GeneratedPluginRegistrant.java not found at: " + file.absolutePath
            }
        }
    }
}
